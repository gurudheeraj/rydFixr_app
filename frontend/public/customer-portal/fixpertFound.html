  socket.on("fixpert-assigned", (res) => {

  function updateFixpertStatus(fixpertCoords, customerCoords, hasStarted) {
    if (!fixpertCoords || !customerCoords) return;

    const distance = data.distance || 0;

    let statusText = "";

    if (!hasStarted) {
      statusText = "🧰 Fixpert is preparing tools...";
    } else if (distance > 3) {
      statusText = "🚀 Fixpert started & heading your way";
    } else if (distance > 0.5) {
      const eta = Math.round(distance * 3);
      statusText = `📍 Fixpert arriving in ${eta} mins`;
    } else {
      statusText = "⚡ Fixpert arriving soon!";
    }

    document.getElementById("fixpertStatus").innerText = statusText;
  }


  const LANDMARK_PRIORITY = [
    // 🟢 HIGH
    "hospital", "fuel", "bus_station", "bus_stop",
    "train_station", "bank", "atm", "police", "post_office",

    // 🟡 MEDIUM
    "school", "university", "restaurant", "cafe", "mall",
    "supermarket", "hotel", "place_of_worship",

    // 🔵 LOW
    "park", "stadium", "theatre", "library"
  ];

  async function getNearbyLandmark(lat, lng, area) {
    try {
      const radius = 100; // meters

      const query = `
        [out:json];
        (
          node(around:${radius},${lat},${lng})["amenity"];
          node(around:${radius},${lat},${lng})["shop"];
          node(around:${radius},${lat},${lng})["tourism"];
        );
        out;
      `;

      const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
      });

      const data = await res.json();

      if (!data.elements || data.elements.length === 0) return null;

      // 🔥 FIND NEAREST
      let nearest = null;
      let minDist = Infinity;

      for (let el of data.elements) {
        // ❌ SKIP place nodes (village/town)
        if (el.tags.place) continue;

        if (el.tags.place || el.tags.boundary) continue;

        // ❌ SKIP if same as area (dynamic)
        if (
          area &&
          el.tags.name.toLowerCase() === area.toLowerCase()
        ) {
          continue;
        }

        function calcDist(a, b, c, d) {
          const R = 6371;
          const dLat = (c - a) * Math.PI / 180;
          const dLon = (d - b) * Math.PI / 180;

          const x =
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(a * Math.PI/180) *
            Math.cos(c * Math.PI/180) *
            Math.sin(dLon/2) *
            Math.sin(dLon/2);

          return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
        }

        const d = calcDist(lat, lng, el.lat, el.lon);

        if (d < minDist) {
          minDist = d;
          nearest = el.tags.name;
        }
      }

      return nearest;

    } catch (err) {
      console.log("Overpass error:", err);
      return null;
    }
  }

  // 🔥 CONVERT COORDINATES → LANDMARK ADDRESS
  async function getSmartAddress(lat, lng, fixpertCoords, customerCoords) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&extratags=1&accept-language=en`,
        {
          headers: { "User-Agent": "RideFixrApp/1.0" }
        }
      );

      const data = await res.json();
      const addr = data.address || {};
      const area =
        addr.town ||
        addr.village ||
        addr.city;

      // 🔥 CALL OVERPASS
      const landmark = await getNearbyLandmark(lat, lng, area);
      const displayName = data.display_name || "";

      // 🔥 LANDMARK LIST
      const possible = [
        { type: "hospital", name: addr.hospital },
        { type: "fuel", name: addr.fuel },
        { type: "bus_station", name: addr.bus_station },
        { type: "bus_stop", name: addr.bus_stop },
        { type: "train_station", name: addr.train_station },
        { type: "bank", name: addr.bank },
        { type: "atm", name: addr.atm },
        { type: "police", name: addr.police },
        { type: "post_office", name: addr.post_office },

        { type: "school", name: addr.school },
        { type: "university", name: addr.university },
        { type: "restaurant", name: addr.restaurant },
        { type: "cafe", name: addr.cafe },
        { type: "mall", name: addr.mall },
        { type: "supermarket", name: addr.supermarket },
        { type: "hotel", name: addr.hotel },
        { type: "place_of_worship", name: addr.place_of_worship },

        { type: "park", name: addr.park },
        { type: "stadium", name: addr.stadium },
        { type: "theatre", name: addr.theatre },
        { type: "library", name: addr.library }
      ];

      // 🔥 FILTER VALID
      const valid = possible.filter(p => p.name);

      // 🔥 LOCATION PARTS
      let road =
        addr.neighbourhood ||
        addr.suburb ||
        addr.hamlet;

      // ❌ REMOVE BAD ROADS (MDR, codes)
      if (road && (road.includes("MDR") || road.match(/^[A-Z0-9]+$/)|| road.includes("Road") || road.includes("Highway"))) {
        road = null;
      }

      // ✅ PRIORITY 1 → OVERPASS (MOST ACCURATE)
      // ✅ CLEAN OVERPASS LOGIC
      if (landmark) {

        let parts = [];

        // ❌ SKIP IF SAME AS AREA
        if (!area || landmark.toLowerCase() !== area.toLowerCase()) {
          parts.push(landmark);
        }

        if (road) parts.push(road);
        if (area) parts.push(area);

        return `📍 Near ${parts.join(", ")}`;
      }

      // ✅ 2. NOMINATIM LANDMARK
      for (let type of LANDMARK_PRIORITY) {
        const found = valid.find(v => v.type === type);

        if (found) {
          if (road && found.name && road.toLowerCase().includes(found.name.toLowerCase())) {
            road = null;
          }

          let locationParts = [];
          if (road) locationParts.push(road);
          if (area) locationParts.push(area);

          const locationText = locationParts.join(", ");

          let parts = [];

          if (!area || found.name.toLowerCase() !== area.toLowerCase()) {
            parts.push(found.name);
          }

          if (road) parts.push(road);
          if (area) parts.push(area);

          return `📍 Near ${parts.join(", ")}`;
        }
      }

      // ✅ 3. DISPLAY NAME (SMART EXTRACTION)
      if (displayName) {
        const parts = displayName.split(",").map(p => p.trim());

        for (let part of parts.slice(0, 3)) {
          if (
            part &&
            !part.match(/^\d+$/) &&
            !part.includes("Road") &&
            !part.includes("Street") &&
            !part.includes("MDR") &&
            part.length > 3
          ) {
            let parts = [];

            if (!area || part.toLowerCase() !== area.toLowerCase()) {
              parts.push(part);
            }

            if (road) parts.push(road);
            if (area) parts.push(area);

            return `📍 Near ${parts.join(", ")}`;
          }
        }
      }

      // ✅ 4. STREET
      if (road) {
        return `📍 Near ${road}${area ? ", " + area : ""}`;
      }

      // ✅ 5. AREA
      if (area) {
        return `📍 Near ${area}`;
      }

      // LAST
      return "📍 Location nearby";

    } catch (err) {
      return "Location unavailable";
    }
  }

  async function loadDistanceAndUpdateUI() {
    try {
      const res = await fetch("http://localhost:5000/api/customer/fixpert-location", {
        headers: {
          Authorization: "Bearer " + localStorage.getItem("token")
        }
      });

      const result = await res.json();

      console.log("🔥 DISTANCE FROM API:", result.distance);

      let distance = result.distance;

      // fallback if ORS fails
      if (!distance) {
        distance = fallbackDistance(
          lat,
          lng,
          data.location.lat,
          data.location.lng
        );
      }

      showAddresses(lat, lng, {
        ...data,
        distance
      });

    } catch (err) {
      console.log("❌ Distance fetch error:", err);
    }
  }

  function fallbackDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
      Math.sin(dLat/2) * Math.sin(dLat/2) +
      Math.cos(lat1 * Math.PI/180) *
      Math.cos(lat2 * Math.PI/180) *
      Math.sin(dLon/2) *
      Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
  }


  async function showAddresses(lat, lng, data) {
    const customerCoords = { lat, lng };
    /*const fixpertCoords = {
      lat: data.location.lat,
      lng: data.location.lng
    };
    */
    console.log("📍 LAT LNG:", lat, lng);
    console.log("📍 FIXPERT LOC:", data.location); 
    const fixpertCoords = {
      lat: data?.location?.lat,
      lng: data?.location?.lng
    };

    if (
      !fixpertCoords.lat ||
      !fixpertCoords.lng ||
      fixpertCoords.lat === 0 ||
      fixpertCoords.lng === 0
    ) {
      console.log("❌ Fixpert location missing", data);
      return;
    }

    // 🔥 GET SMART ADDRESSES
    const customerAddr = await getSmartAddress(
      lat, lng, fixpertCoords, customerCoords
    );

    const fixpertAddr = await getSmartAddress(
      data.location.lat,
      data.location.lng,
      fixpertCoords,
      customerCoords
    );


    document.getElementById("customerLocation").innerText = customerAddr;

    const request = JSON.parse(localStorage.getItem("fixpertRequest"));
    const distance = request?.distance;

    let distanceText = "";

    if (distance) {
      if (distance < 1) {
        // 🔥 convert to meters
        const meters = Math.round(distance * 1000);
        if(meters<1000){
          distanceText = ` (${meters} m away)`;
        }
        else {
          distanceText = ` (${(meters / 1000).toFixed(1)} km away)`;
        }
      } else {
        distanceText = ` (${Number(distance).toFixed(1)} km away)`;
      }
    }
    console.log("🔥 DISTANCE RECEIVED:", data.distance);

    document.getElementById("fixpertLocation").innerText =
      fixpertAddr + distanceText;
  }


  socket.on("cancel-denied", (data) => {

  document.getElementById("fixpertId").innerText = data.mechanicId || "RF000000";

  console.log("📦 FIXPERT DATA:", data);
  console.log("📦 REQUEST DATA:", request);

  // LOCATIONS
  const lat =
    request?.location?.lat ||
    request?.latitude ||
    data?.customerLocation?.lat ||
    data?.customerLocation?.latitude;

  const lng =
    request?.location?.lng ||
    request?.longitude ||
    data?.customerLocation?.lng ||
    data?.customerLocation?.longitude;

  if (!lat || !lng) {
    alert("Invalid location data");
    showLoaderAndRedirect("customer-dashboard.html");
  }
  console.log("FixpertFound Location:", lat, lng);
  /*document.getElementById("customerLocation").innerText =
  `${parseFloat(lat).toFixed(5)}, ${parseFloat(lng).toFixed(5)}`;

  document.getElementById("fixpertLocation").innerText =
  `${data.location.lat}, ${data.location.lng}`; */

  // 🔥 SHOW HUMAN FRIENDLY LOCATION
  //loadDistanceAndUpdateUI();
  //setInterval(loadDistanceAndUpdateUI, 5000);

  showAddresses(lat, lng, data); // 🔥 DIRECT CALL

  const customerCoords = { lat, lng };
  const fixpertCoords = {
    lat: data.location.lat,
    lng: data.location.lng
  };
  // initial state (not started yet)
  if (localStorage.getItem("lockCompleted") === "true") {
    updateFixpertStatus(fixpertCoords, customerCoords, false);
  }

  socket.on("fixpert-location-update", (live) => {
    if (localStorage.getItem("lockCompleted") === "true") {
      updateFixpertStatus(live.fixpertCoords, customerCoords, true);
    }
  });

  // CALL FUNCTION
  function callFixpert() {
    window.location.href = `tel:${data.phone}`;
  }

  // TRACK BUTTON
  function openTracking() {
    showLoaderAndRedirect("tracking.html");
  }

  // CANCEL
  function cancelRide() {
    const assignedAtRaw = localStorage.getItem("assignedAt");

    if (!assignedAtRaw) {
      alert("Invalid session ❌");
      return;
    }

    const assignedAt = parseInt(assignedAtRaw);
    const now = Date.now();

    if (isNaN(assignedAt) || now - assignedAt > 30000) {
      alert("Cancel time expired ❌");
      return;
    }
    // ✅ Emit cancel to backend
    socket.emit("cancel-fixpert", {
      customerEmail: localStorage.getItem("customerEmail")
    });

    // ✅ Clear ONLY ride-related data (NOT full localStorage)
    localStorage.removeItem("lockStarted");
    localStorage.removeItem("fixpertRequest");
    localStorage.removeItem("fixpertDetails");
    localStorage.removeItem("assignedAt");
    localStorage.removeItem("lockCompleted");
    localStorage.removeItem("rideStatus");
    localStorage.removeItem("rideOTP");

    alert("Request cancelled successfully");

    showLoaderAndRedirect("customer-dashboard.html");
  }

  // 🔥 SEND OTP TO FIXPERT
  socket.emit("send-otp", {
    otp,
    fixpertId: data.mechanicId,
    customerEmail: localStorage.getItem("customerEmail")
  });



  function startLock(assignedAt) {
    const lockCard = document.getElementById("lockCard");
    const timerEl = document.getElementById("lockTimer");
    const cancelBtn = document.querySelector(".cancel-btn");

    console.log("LOCK STARTED");

    if (!assignedAt) return; // safety

    const now = Date.now();
    let remaining = 30000 - (now - assignedAt);

    if (remaining <= 0) {
      localStorage.setItem("lockCompleted", "true");
      localStorage.setItem("rideStatus", "ACTIVE");
      unlockUI();
      return;
    }
    
    document.body.classList.add("locked");
    // ✅ Enable cancel during lock
    cancelBtn.disabled = false;
    cancelBtn.style.pointerEvents = "auto";
    cancelBtn.style.opacity = "1";
    cancelBtn.innerText = "Cancel Ride";
    document.getElementById("fixpertStatus").innerText = "";
    lockCard.style.display = "block";
    lockCard.style.backdropFilter = "blur(6px)";

    /*let seconds = Math.ceil(remaining / 1000);
    console.log("AssignedAt:", assignedAt);
    console.log("Now:", now);
    console.log("Remaining:", remaining);

    timerEl.innerText = seconds;

    const interval = setInterval(() => {
      seconds--;
      timerEl.innerText = seconds;

      if (seconds <= 0) {
        clearInterval(interval);

        // 🔥 MARK LOCK COMPLETED
        localStorage.setItem("lockCompleted", "true");
        localStorage.setItem("rideStatus", "ACTIVE");

        unlockUI();
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        audio.play();

        cancelBtn.disabled = true;
        cancelBtn.style.pointerEvents = "none";
        cancelBtn.style.opacity = "0.5";
        cancelBtn.innerText = "Cancel Disabled";
      }
    }, 1000);
    */ 

    function updateTimer() {

      const now = Date.now();
      const remaining = 30000 - (now - assignedAt);

      if (remaining <= 0) {
        clearInterval(interval);

        localStorage.setItem("lockCompleted", "true");
        localStorage.setItem("rideStatus", "ACTIVE");

        unlockUI();

        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        audio.play().catch(() => {});

        cancelBtn.disabled = true;
        cancelBtn.style.pointerEvents = "none";
        cancelBtn.style.opacity = "0.5";
        cancelBtn.innerText = "Cancel Disabled";

        return;
      }

      const seconds = Math.ceil(remaining / 1000);
      timerEl.innerText = seconds;
    }
    updateTimer(); // run immediately
    const interval = setInterval(updateTimer, 1000);
  }
  

  window.onload = () => {
    let rideStatus = localStorage.getItem("rideStatus");

    // 🔥 NEW ENTRY → SET LOCKED
    if (!rideStatus) {
      localStorage.setItem("rideStatus", "LOCKED");
      rideStatus = "LOCKED";
    }

    const lockCompleted = localStorage.getItem("lockCompleted");

    // 🔥 IF ALREADY COMPLETED → DO NOT LOCK AGAIN
    if (lockCompleted === "true") {
      unlockUI();

      // 🔥 FORCE DISABLE CANCEL AFTER REFRESH
      const cancelBtn = document.querySelector(".cancel-btn");

      cancelBtn.disabled = true;
      cancelBtn.style.pointerEvents = "none";
      cancelBtn.style.opacity = "0.5";
      cancelBtn.innerText = "Cancel Disabled";

      return;
    }

    let assignedTime = localStorage.getItem("assignedAt");

    if (!assignedTime) {
      console.log("⏳ Waiting for socket event...");
      return; // ❌ DO NOT start lock
    }
    assignedTime = parseInt(assignedTime); // ✅ correct
    startLock(assignedTime);
    // 🔥 VERY IMPORTANT (after setting state)
  };
  

  function unlockUI() {
    document.body.classList.remove("locked");

    const lockCard = document.getElementById("lockCard");
    if (lockCard) lockCard.style.display = "none";

    // 🔥 Update status instead of hardcoding UI
    localStorage.setItem("rideStatus", "ACTIVE");

    const fixpertCoords = {
      lat: data.location.lat,
      lng: data.location.lng
    };

    const customerCoords = { lat, lng };

    if (localStorage.getItem("lockCompleted") === "true") {
      updateFixpertStatus(fixpertCoords, customerCoords, false);
    }
    const cancelBtn = document.querySelector(".cancel-btn");
    cancelBtn.disabled = true;
    cancelBtn.style.pointerEvents = "none";
    cancelBtn.style.opacity = "0.5";
    cancelBtn.innerText = "Cancel Disabled";
    localStorage.removeItem("lockStarted");
  }

  function showLoaderAndRedirect(url) {
    const loader = document.getElementById("pageLoader");

    if (loader) {
      loader.style.display = "flex";
    }

    setTimeout(() => {
      window.location.href = url;
    }, 1200);
  }

</script>

  <div id="lockCard" style="
    position: fixed;
    bottom: 120px;

    transform: translateX(-50%);
    background: #fff;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    font-weight: bold;
    z-index: 9999;
    display: none;
  ">
    🔄 Connecting to Fixpert... <br><br>
    <span id="lockTimer" style="color:#0f52ba;font-size:20px;">30</span> sec
  </div>

    position: fixed;

    background: #fff;

    align-items: center;
    z-index: 99999;
  ">

    <div class="dot-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
