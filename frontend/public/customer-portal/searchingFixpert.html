<!DOCTYPE html>
<html>
<head>
  <title>Searching Fixpert</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #fff;
    }

    img {
      width: 150px;
    }

    .loader {
      width: 200px;
      height: 5px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }

    .bar {
      width: 30%;
      height: 100%;
      background: #0f52ba;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    .cancel-btn {
        position: absolute;
        bottom: 30px;
        width: 80%;
        left: 10%;
        padding: 15px;

        border-radius: 25px;
        border: 2px solid #e53935;
        background: #fff;
        color: #e53935;

        font-size: 16px;
        cursor: pointer;

        transition: all 0.3s ease; /* 🔥 smooth */
    }
    .cancel-btn:hover {
        background: #ffebee;   /* 🔥 red fill */
        color: #e53935;           /* white text */
        transform: scale(1.02); /* slight zoom */
        box-shadow: 0 6px 15px rgba(229,57,53,0.3);
    }
    .cancel-btn:active {
        transform: scale(0.97);
    }

    .dot-loader {
        display: flex;
        gap: 10px;
        }

    .dot-loader span {
        width: 14px;
        height: 14px;
        background: #0f52ba;
        border-radius: 50%;
        animation: bounce 1.4s infinite;
    }

    .dot-loader span:nth-child(2) {
        animation-delay: 0.2s;
    }
    .dot-loader span:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
          transform: scale(0.5);
          opacity: 0.5;
      }
      40% {
          transform: scale(1.2);
          opacity: 1;
      }
    }
  </style>
</head>

<body>

  <img src="../images/mechanic.jpg" />

  <p>Looking for your</p>
  <h2>Fixpert...</h2>

  <div class="loader">
    <div class="bar"></div>
  </div>

  <button class="cancel-btn" onclick="openModal()">Cancel Request</button>
  <div id="cancelModal" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;">

    <div style="
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        width: 300px;
        text-align: center;
    ">

        <p style="font-size:16px; margin-bottom:20px;">
        Are you sure you want to cancel the request?
        </p>

        <div style="display:flex; justify-content:space-between; gap:10px;">

        <button onclick="closeModal()" style="
            flex:1;
            padding:10px;
            border-radius:8px;
            border:1px solid #333;
            background:#fff;
            cursor:pointer;
        ">
            Don't Cancel
        </button>

        <button onclick="confirmCancel()" class="confirmCancel" style="
            flex:1;
            padding:10px;
            border-radius:8px;
            border:none;
            background:#578dde;
            cursor:pointer;
        " >
            Cancel
        </button>

        </div>

    </div>

    </div>

    <script src="http://localhost:5001/socket.io/socket.io.js"></script>
<script>
  const socket = io("http://localhost:5001");
  // 🔥 CLEAR OLD SESSION FLAG ON PAGE LOAD
  sessionStorage.removeItem("assignedReceived");
  // 🔥 CLEAR OLD ASSIGNMENT (CRITICAL FIX)
  localStorage.removeItem("assignedAt");
  localStorage.removeItem("fixpertDetails");

  socket.on("connect", () => {
    const customerEmail = localStorage.getItem("customerEmail")?.toLowerCase().trim();

    console.log("🔌 Connected to socket");

    if (customerEmail) {
      socket.emit("register-customer", customerEmail);
      console.log("✅ Registered customer:", customerEmail);
    }
    setTimeout(() => {
      if (!localStorage.getItem("fixpertDetails")) {
        console.log("⏳ Still waiting for fixpert...");
      }
    }, 5000);
  });
  socket.onAny((event, data) => {
    console.log("📡 RECEIVED EVENT:", event, data);
  });

  let requestData = JSON.parse(localStorage.getItem("fixpertRequest"));

  if (!requestData) {
    console.warn("⚠️ No request data found, but waiting for socket...");
  }

  // 🔥 Send request again from this page
  if (!sessionStorage.getItem("requestSent") && requestData?.latitude && requestData?.longitude) {
    //socket.emit("book-fixpert", requestData);
    sessionStorage.setItem("requestSent", "true");
  }

  // ✅ OPEN MODAL
  function openModal() {
    document.getElementById("cancelModal").style.display = "flex";
  }

  // ✅ CLOSE MODAL
  function closeModal() {
    document.getElementById("cancelModal").style.display = "none";
  }

  // ✅ FINAL CANCEL (after confirmation)
  function confirmCancel() {
    socket.emit("cancel-fixpert", {
      customerEmail: localStorage.getItem("customerEmail")
    });

    // clear stored data
    localStorage.removeItem("fixpertRequest");
    sessionStorage.removeItem("requestSent");

    showLoaderAndRedirect("customer-dashboard.html");
  }

  // 🔥 When fixpert found
  /*
  socket.on("fixpert-assigned", (data) => {

    if (sessionStorage.getItem("assignedReceived")==="true") return;

    if (!data || !data.fixpert || !data.fixpert.mechanicId) {
      console.log("❌ Invalid fixpert data");
      return;
    }

    sessionStorage.setItem("assignedReceived", "true");

    console.log("🚀 fixpert assigned", data);

    //localStorage.setItem("fixpertDetails", JSON.stringify(data.fixpert));
    localStorage.setItem("fixpertDetails", JSON.stringify({
      ...data.fixpert,
      distance: data.distance // 🔥 IMPORTANT
    }));
    localStorage.setItem("fixpertRequest", JSON.stringify({
      location: {
        lat: data.customerLocation.lat,
        lng: data.customerLocation.lng
      },
      distance: data.distance
    }));
    showLoaderAndRedirect("fixpertFound.html");
  });
  */ 
  socket.on("fixpert-assigned", (data) => {

    console.log("📡 RECEIVED EVENT:", data);

    if (!data || !data.assignedAt) {
      console.log("❌ Invalid data");
      return;
    }

    // 🔥 REMOVE THIS BLOCKING CONDITION COMPLETELY
    // ❌ if (sessionStorage.getItem("assignedReceived")==="true") return;

    sessionStorage.setItem("assignedReceived", "true");

    console.log("✅ Redirecting now...");

    // ✅ SAVE EVERYTHING
    localStorage.setItem("assignedAt", data.assignedAt);

    localStorage.setItem("fixpertDetails", JSON.stringify({
      ...data.fixpert,
      distance: data.distance
    }));

    localStorage.setItem("fixpertRequest", JSON.stringify({
      location: {
        lat: data.customerLocation.lat,
        lng: data.customerLocation.lng
      },
      distance: data.distance
    }));

    // 🔥 FORCE REDIRECT
    //window.location.href = "fixpertFound.html";
    showLoaderAndRedirect("fixpertFound.html");
  });

  socket.on("disconnect", () => {
    console.log("❌ Socket disconnected");
  });

  socket.on("connect", () => {
    console.log("🔌 Reconnected");

    const customerEmail = localStorage.getItem("customerEmail")?.toLowerCase().trim();

    if (customerEmail) {
      socket.emit("register-customer", customerEmail);
      console.log("🔁 Re-registered customer:", customerEmail);
    }
  });
  function showLoaderAndRedirect(url) {
    document.getElementById("pageLoader").style.display = "flex";
    setTimeout(()=>{
        window.location.href=url;
    },1200);
  }
</script>
    <div id="pageLoader" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        ">

        <div class="dot-loader">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>
</body>
</html>
