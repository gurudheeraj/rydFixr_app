<script src="http://localhost:5001/socket.io/socket.io.js"></script>
<script>
  

  const inputs = document.querySelectorAll(".otp-input");
  const verifyBtn = document.getElementById("verifyBtn");

  inputs.forEach((input, index) => {
    input.addEventListener("input", () => {

      if (input.value.length === 1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }

      checkOTPComplete();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  function checkOTPComplete() {
    let otp = "";

    inputs.forEach(i => otp += i.value);

    if (otp.length === inputs.length) {
      verifyBtn.disabled = false;
      verifyBtn.classList.add("active");
    } else {
      verifyBtn.disabled = true;
      verifyBtn.classList.remove("active");
    }
  }
  const socket = io("http://localhost:5001");

  socket.on("connect", () => {
    socket.emit("register-fixpert", fixpert.mechanicId);
    console.log("✅ Fixpert registered:", fixpert.mechanicId);
  });
  // 🔥 RECEIVE assignedAt from backend
  /*
  socket.on("request-accepted", (data) => {
    console.log("📥 Request accepted:", data);

    localStorage.setItem("assignedAt", data.assignedAt);
  });
  */ 

  const request = JSON.parse(localStorage.getItem("activeRequest"));

  // 🔥 CREATE STABLE REQUEST KEY
  const requestKey = request.email + "_" + request.issue + "_" + request.distance;

  const lastRequestKey = localStorage.getItem("lastRequestKey");

  if (requestKey !== lastRequestKey) {
    console.log("🆕 New request detected → resetting lock");

    localStorage.removeItem("lockCompleted");

    // ✅ SET ONLY ONCE
    localStorage.setItem("assignedAt", Date.now());

    localStorage.setItem("lastRequestKey", requestKey);
  }

  const fixpertData = JSON.parse(localStorage.getItem("fixpertData")); // from login
  console.log("REQUEST DATA:", request);

  const customerEmail = request.email;

  const customerLocation = {
    lat: request.location.latitude,
    lng: request.location.longitude
  };

  const distance = request.distance;

  const fixpert = {
    name: fixpertData.name,
    phone: fixpertData.phone,
    mechanicId: fixpertData.mechanicId,
    location: {
      lat: fixpertData.lat || 0,
      lng: fixpertData.lng || 0
    }
  };

  /*
  socket.on("connect", () => {
    console.log("✅ Fixpert connected");

    if (!customerEmail || !fixpertData) {
      console.log("❌ Missing data, not emitting");
      return;
    }

    socket.emit("request-accepted", {
      customerEmail,
      fixpertInfo: {
        ...fixpert,
        customerLocation,
        distance
      }
    });
    console.log("📤 request-accepted emitted");
  }); */

  socket.on("fixpert-assigned", (data) => {
    console.log("REQUEST:", data);
    console.log("📥 AssignedAt received:", data.assignedAt);

    request = data.fixpert;

    console.log("Saved request:", request); // debug
    console.log("Customer email:", request?.customerEmail); // debug

    localStorage.removeItem("lockCompleted");
    localStorage.removeItem("lockInitialized");
    localStorage.setItem("assignedAt", Date.now());

    // 🔥 delay ensures storage is ready
    setTimeout(() => {
      startFixpertLock();
    }, 50);
  });

  socket.on("otp-result", (res) => {
    console.log("OTP RESULT:",res)
    if (res.success) {
      document.getElementById("otpModal").style.display = "none";

      alert("✅ OTP Verified! Service Started");
      showLoaderAndRedirect("fixpert-dashboard.html");


      // 👉 next step logic here
    } else {
      alert("❌ Wrong OTP");
    }
  });
  
  const LANDMARK_PRIORITY = [
    "hospital",
    "fuel",
    "bus_station",
    "bus_stop",
    "train_station",
    "bank",
    "atm",
    "police",
    "post_office",
    "school",
    "restaurant",
    "cafe",
    "mall",
    "hotel",
    "place_of_worship"
  ];

  if (!request) {
    alert("No request found");
    showLoaderAndRedirect("fixpert-dashboard.html");
  }

  /* DATA DISPLAY */
  document.getElementById("customerName").innerText = request.name;
  document.getElementById("issue").innerText = request.issue;
  //document.getElementById("distance").innerText = request.distance + " km";
  if (request.distance) {
    if (request.distance < 1) {
      // 🔥 convert to meters
      const meters = Math.round(request.distance * 1000);
      document.getElementById("distance").innerText = meters + " m";
      
    } else {
      document.getElementById("distance").innerText = request.distance + " km";
    }
  }

  // 🔥 LOAD LOCATIONS
  async function loadLocations() {

    document.getElementById("fixpertLocation").innerText = "Fetching location...";
    document.getElementById("customerLocation").innerText = "Fetching location...";

    try {
      // ✅ CUSTOMER LOCATION (from request)
      const customerLat = request.location?.latitude;
      const customerLng = request.location?.longitude;

      // ✅ FIXPERT LOCATION (live GPS)
      navigator.geolocation.getCurrentPosition(async (pos) => {

        const fixpertLat = pos.coords.latitude;
        const fixpertLng = pos.coords.longitude;

        // 🔥 CALL FUNCTION HERE (THIS IS WHAT YOU ASKED)
        const [fixpertAddress, customerAddress] = await Promise.all([
          getSmartAddress(fixpertLat, fixpertLng),
          getSmartAddress(customerLat, customerLng)
        ]);

        document.getElementById("fixpertLocation").innerText = fixpertAddress;
        document.getElementById("customerLocation").innerText = customerAddress;

      }, (err) => {
        console.error("GPS error:", err);
        document.getElementById("fixpertLocation").innerText = "Unable to fetch location";
        document.getElementById("customerLocation").innerText = "Unable to fetch location";
      });

    } catch (err) {
      console.error(err);
    }
  }

  // ✅ CALL FUNCTION (IMPORTANT)
  loadLocations();

  /* CALL */
  document.getElementById("callBtn").onclick = () => {
    if (request.phone) {
      window.location.href = "tel:" + request.phone;
    }
  };

  async function getNearbyLandmark(lat, lng) {
    try {
      const radius = 100;

      const query = `
        [out:json];
        (
          node(around:${radius},${lat},${lng})["amenity"];
          node(around:${radius},${lat},${lng})["shop"];
          node(around:${radius},${lat},${lng})["tourism"];
        );
        out;
      `;

      const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
      });

      const data = await res.json();

      if (!data.elements || data.elements.length === 0) return null;

      let nearest = null;
      let minDist = Infinity;

      for (let el of data.elements) {
        if (!el.tags || !el.tags.name) continue;

        function calcDist(a, b, c, d) {
          const R = 6371;
          const dLat = (c - a) * Math.PI / 180;
          const dLon = (d - b) * Math.PI / 180;

          const x =
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(a * Math.PI/180) *
            Math.cos(c * Math.PI/180) *
            Math.sin(dLon/2) *
            Math.sin(dLon/2);

          return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
        }

        const d = calcDist(lat, lng, el.lat, el.lon);

        if (d < minDist) {
          minDist = d;
          nearest = el.tags.name;
        }
      }

      return nearest;

    } catch (err) {
      console.log("Overpass error:", err);
      return null;
    }
  }

  async function getSmartAddress(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=en`,
        {
          headers: {
            "User-Agent": "RideFixrApp/1.0"
          }
        }
      );

      const data = await res.json();

      const addr = data.address || {};
      const area =
        addr.town ||       // ✅ Porumamilla FIRST
        addr.village ||
        addr.city;

      // 🔥 CALL OVERPASS
      const landmark = await getNearbyLandmark(lat, lng);
      const displayName = data.display_name || "";

      // 🔥 LANDMARK CHECK FROM ADDRESS
      const possible = [
        { type: "hospital", name: addr.hospital },
        { type: "fuel", name: addr.fuel },
        { type: "bank", name: addr.bank },
        { type: "atm", name: addr.atm },
        { type: "bus_stop", name: addr.bus_stop },
        { type: "restaurant", name: addr.restaurant },
        { type: "cafe", name: addr.cafe },
        { type: "school", name: addr.school },
        { type: "mall", name: addr.mall },
        { type: "hotel", name: addr.hotel }
      ];

      const valid = possible.filter(p => p.name);

      let road =
        addr.neighbourhood ||   // ✅ BEST (like Reddy Nagar)
        addr.suburb ||          // fallback
        addr.hamlet;        
      // ❌ REMOVE BAD ROADS LIKE MDR, NH, etc.
      if (road && (road.includes("MDR") || road.match(/^[A-Z0-9]+$/) || road.includes("Road") || road.includes("Highway"))) {
        road = null;
      }

      // ✅ 1. OVERPASS FIRST
      if (landmark) {
        if (area && landmark.toLowerCase() === area.toLowerCase()) {
          landmark = null;
        }
        let parts = [];
        if (landmark) parts.push(landmark);
        if (road) parts.push(road);   // street
        if (area) parts.push(area);   // town

        return `📍 Near ${parts.join(", ")}`;
      }

      // ✅ 1. PRIORITY LANDMARK
      for (let type of LANDMARK_PRIORITY) {
        const found = valid.find(v => v.type === type);

        if (found && found.name) {
          let landmarkName = found.name;
          // ❌ REMOVE DUPLICATE
          if (area && landmarkName.toLowerCase() === area.toLowerCase()) {
            landmarkName = null;
          }

          let parts = [];

          if (landmarkName) parts.push(landmarkName);
          if (road) parts.push(road);
          if (area) parts.push(area);
          return `📍 Near ${parts.join(", ")}`;
        }
      }

      // ✅ 2. 🔥 DISPLAY NAME FALLBACK (KEY FIX)
      // 🔥 SMART DISPLAY NAME (LANDMARK EXTRACTION)
      if (displayName) {
        const parts = displayName.split(",").map(p => p.trim());

        // 👉 try first 2 parts (skip numbers/road codes)
        for (let part of parts.slice(0, 3)) {
          if (
            part &&
            !part.match(/^\d+$/) &&              // skip numbers
            !part.includes("Road") &&
            !part.includes("Street") &&
            !part.includes("MDR") &&
            part.length > 3
          ) {
            let landmarkName = part;

            // ❌ REMOVE DUPLICATE
            if (area && landmarkName.toLowerCase() === area.toLowerCase()) {
              landmarkName = null;
            }

            let partsArr = [];

            if (landmarkName) partsArr.push(landmarkName);
            if (road) partsArr.push(road);
            if (area) partsArr.push(area);

            return `📍 Near ${partsArr.join(", ")}`;
          }
        }
      }
      // ✅ 3. AREA FALLBACK
      // ✅ 2. STREET FALLBACK
      if (road) {
        return `📍 Near ${road}${area ? ", " + area : ""}`;
      }

      // ✅ 3. AREA FALLBACK
      if (area) {
        return `📍 Near ${area}`;
      }

      // ✅ 4. LAST
      return "📍 Location nearby";

    } catch (err) {
      console.error("Location error:", err);
      return "Location unavailable";
    }
  }

  /* NAVIGATION PAGE */
  function openNavigation() {
    localStorage.setItem("navRequest", JSON.stringify(request));
    showLoaderAndRedirect("navigation.html");

  /* GOOGLE MAP DIRECT NAVIGATION */
  function openGoogleMaps() {
    const customerLat = request?.location?.latitude;
    const customerLng = request?.location?.longitude;

    if (!customerLat || !customerLng) {
      alert("❌ Customer location missing");
      console.log("REQUEST:", request);
      return;
    }

    navigator.geolocation.getCurrentPosition((pos) => {

      const fixpertLat = pos.coords.latitude;
      const fixpertLng = pos.coords.longitude;

      const url = `https://www.google.com/maps/dir/?api=1&origin=${fixpertLat},${fixpertLng}&destination=${customerLat},${customerLng}&travelmode=driving`;

      console.log("🧭 MAP URL:", url);

      window.open(url, "_blank");

    }, (err) => {
      alert("❌ Unable to fetch your location");
      console.log(err);
    });
  }

  /* REACHED */
  function reachedDestination() {

  // 🔥 LOCK SYSTEM FOR FIXPERT

  let lockInterval = null;

  function startFixpertLock() {

    if (localStorage.getItem("lockCompleted") === "true") {
      console.log("✅ Lock already completed — skipping");
      return;
    }

    const LOCK_DURATION = 30000;

    // 🔥 FIRST TIME INIT

    const assignedAt = parseInt(localStorage.getItem("assignedAt"));
    if (isNaN(assignedAt)) return;

    console.log("🔒 Fixpert screen locked");

    // 🔥 CREATE OVERLAY
    let overlay = document.getElementById("lockOverlay");

    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "lockOverlay";
      overlay.innerHTML = `
        ⏳ Verifying Request...
        <span id="countdownText"></span>
      `;
      document.body.appendChild(overlay);
    }

    // 🔥 COUNTDOWN LOOP
    lockInterval = setInterval(() => {
      const now = Date.now();
      const remaining = LOCK_DURATION - (now - assignedAt);

      if (remaining <= 0) {
        clearInterval(lockInterval);
        unlockFixpertUI();
        return;
      }

      const seconds = Math.ceil(remaining / 1000);
      document.getElementById("countdownText").innerText = seconds;
    }, 1000);
  }

  function unlockFixpertUI() {
    console.log("🔓 Fixpert screen unlocked");

    const overlay = document.getElementById("lockOverlay");
    if (overlay) overlay.remove();

    const countdownEl = document.getElementById("lockCountdown");
    if (countdownEl) countdownEl.remove();

    if (lockInterval) {
      clearInterval(lockInterval);
      lockInterval = null;
    }
    localStorage.setItem("lockCompleted", "true");
  }

  function getEnteredOTP() {
    const inputs = document.querySelectorAll(".otp-input");
    let otp = "";

    inputs.forEach(input => {
      otp += input.value;
    });

    return otp;
  }

  function verifyOTP() {
    const enteredOTP = getEnteredOTP();
    console.log("Sending email:", request?.customerEmail);
    console.log("Entered OTP:", enteredOTP);

    socket.emit("verify-otp", {
      otp: enteredOTP,
      fixpertId: fixpert.mechanicId,
    });
  }

  if (localStorage.getItem("lockCompleted") !== "true") {
    startFixpertLock();
  }

  function showLoaderAndRedirect(url) {
    document.getElementById("pageLoader").style.display = "flex";

    setTimeout(() => {
      window.location.href = url;
    }, 1200); // 🔥 smooth delay
  }
</script>

    position: fixed;

    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
  ">

    <div class="dot-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
